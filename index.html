<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECI - Education Community Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent: #ffffff;
            --muted: #666666;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--accent);
            margin: 0;
            overflow-x: hidden;
        }

        .text-xs-custom { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .text-small { font-size: 0.8rem; }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s ease;
        }

        .loader-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 300;
            letter-spacing: 0.5rem;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.2; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Member Card Pure CSS (Glassmorphism) */
        .member-card {
            width: 340px;
            height: 200px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            position: relative;
            padding: 20px;
            backdrop-filter: blur(10px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 20px auto;
        }

        .card-bg-decoration {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            z-index: 0;
        }

        .card-header {
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .card-type {
            font-size: 0.5rem;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .card-body {
            z-index: 1;
        }

        .card-name {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-id {
            font-family: monospace;
            font-size: 0.7rem;
            color: #aaa;
        }

        .card-footer {
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.55rem;
            color: #888;
        }

        /* Form Custom */
        input, select, textarea {
            background: transparent !important;
            border-bottom: 1px solid #333 !important;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-bottom-color: #fff !important;
            outline: none;
        }

        .hidden-section { display: none; }
    </style>
</head>
<body class="antialiased">

    <!-- Loader -->
    <div id="loader">
        <div class="loader-logo">ECI.2026</div>
    </div>

    <main class="min-h-screen p-6 md:p-12 flex flex-col items-center">
        <!-- Header -->
        <header class="w-full max-w-lg mb-12 text-center">
            <h1 class="text-xs-custom mb-2">Education Community Indonesia</h1>
            <p class="text-small text-gray-500">Formulir Pendaftaran Anggota</p>
        </header>

        <!-- Registration Form -->
        <section id="form-container" class="w-full max-w-lg">
            <form id="registrationForm" class="space-y-8">
                
                <div>
                    <label class="text-xs-custom block mb-1">Nama Lengkap</label>
                    <input type="text" id="name" required class="w-full py-2 text-small">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-xs-custom block mb-1">Umur</label>
                        <input type="number" id="age" min="14" placeholder="Min. 14" required class="w-full py-2 text-small">
                    </div>
                    <div>
                        <label class="text-xs-custom block mb-1">Gender</label>
                        <select id="gender" required class="w-full py-2 text-small text-gray-400">
                            <option value="">Pilih</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-xs-custom block mb-1">Status</label>
                    <select id="status" required class="w-full py-2 text-small text-gray-400">
                        <option value="">Pilih Status</option>
                        <option value="Pelajar">Pelajar</option>
                        <option value="Mahasiswa">Mahasiswa</option>
                        <option value="Berkeluarga">Berkeluarga</option>
                        <option value="Bekerja">Bekerja</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs-custom block mb-1">Minat Utama</label>
                    <select id="interest" required class="w-full py-2 text-small text-gray-400">
                        <option value="">Pilih Bidang</option>
                        <option value="Astronomi">Astronomi</option>
                        <option value="Sejarah">Sejarah</option>
                        <option value="Teknologi">Teknologi</option>
                        <option value="Fisika/Matematika">Fisika / Matematika</option>
                        <option value="Sastra">Sastra</option>
                        <option value="Desain grafis">Desain Grafis</option>
                        <option value="Linguistik">Linguistik / Bahasa Asing</option>
                        <option value="Psikologi">Psikologi</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs-custom block mb-1">Pengetahuan Terkait Minat</label>
                    <textarea id="knowledge" rows="3" required placeholder="Ceritakan singkat..." class="w-full py-2 text-small"></textarea>
                </div>

                <div>
                    <label class="text-xs-custom block mb-1">Media Sosial</label>
                    <input type="text" id="social" required placeholder="Tiktok / IG / ID" class="w-full py-2 text-small">
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full border border-white/20 hover:bg-white hover:text-black py-3 text-xs-custom transition-all">
                        SUBMIT & GENERATE CARD
                    </button>
                </div>
            </form>
        </section>

        <!-- Result Section (Success) -->
        <section id="result-container" class="hidden-section w-full max-w-lg text-center">
            <h2 class="text-xs-custom mb-6">Selamat Datang di ECI</h2>
            
            <!-- Card Wrapper for html2canvas -->
            <div id="capture-area">
                <div class="member-card">
                    <div class="card-bg-decoration"></div>
                    <div class="card-header">
                        <span class="card-logo">ECI</span>
                        <span class="card-type">Official Member</span>
                    </div>
                    <div class="card-body text-left">
                        <div class="card-name" id="display-name">FULL NAME</div>
                        <div class="card-id" id="display-id">ECI-2026-0000</div>
                    </div>
                    <div class="card-footer">
                        <div class="flex flex-col text-left">
                            <span>SINCE 2026</span>
                            <span id="display-status">STATUS</span>
                        </div>
                        <div class="text-right">
                            EDUCATION COMMUNITY<br>INDONESIA
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8 space-y-4">
                <button onclick="downloadCard()" class="w-full py-3 text-xs-custom border border-white/30 hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    DOWNLOAD MEMBER CARD
                </button>
                
                <a href="https://chat.whatsapp.com/HHcjDimJuVABphM5cFg6XU?mode=gi_t" target="_blank" class="block w-full py-3 text-xs-custom bg-white text-black font-semibold hover:bg-gray-200 transition-all">
                    MASUK GRUP SELEKSI
                </a>
            </div>
        </section>

        <footer class="mt-20 opacity-30 text-xs-custom pb-8">
            © 2026 ECI COMMUNITY
        </footer>
    </main>

    <script>
        // Loading sequence
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 800);
            }, 2000);
        });

        // Generate Random ID
        function generateMemberId() {
            const rand = Math.floor(1000 + Math.random() * 9000);
            return `ECI-2026-${rand}`;
        }

        // Handle Form Submission
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect Data
            const name = document.getElementById('name').value;
            const status = document.getElementById('status').value;
            const memberId = generateMemberId();

            // Update Card Display
            document.getElementById('display-name').textContent = name.toUpperCase();
            document.getElementById('display-id').textContent = memberId;
            document.getElementById('display-status').textContent = status.toUpperCase();

            // Switch View
            document.getElementById('form-container').classList.add('hidden-section');
            document.getElementById('result-container').classList.remove('hidden-section');
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Download Logic
        function downloadCard() {
            const element = document.getElementById('capture-area');
            html2canvas(element, {
                backgroundColor: '#0a0a0a',
                scale: 3, // High quality
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `ECI-Member-Card.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
